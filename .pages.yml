media:
  input: gallery
  output: /gallery

content:
  - name: gallery
    label: Gallery photos
    type: file
    path: data/gallery.json
    format: json
    fields:
      - name: photos
        label: Photos
        type: object
        list:
          collapsible: true
          summary: "{caption}"
        fields:
          - name: image
            label: Photo
            type: image
            options:
              path: gallery
          - name: caption
            label: Caption
            type: string
          - name: layout
            label: Size on page
            type: select
            options:
              values:
                - name: default
                  label: Standard
                - name: tall
                  label: Tall
                - name: wide
                  label: Wide
